services:
  postgres_db:
    image: postgres:15-alpine
    container_name: kalite_veritabani
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: kalite_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_db:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - INIT_ADMIN_USER=${INIT_ADMIN_USER}
      - INIT_ADMIN_PASS=${INIT_ADMIN_PASS}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - postgres_db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: kalite_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata: